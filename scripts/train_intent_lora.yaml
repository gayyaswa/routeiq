### LLaMA Factory LoRA fine-tune config for day-trip intent classifier
### Run: llamafactory-cli train scripts/train_intent_lora.yaml
### Export after training: llamafactory-cli export scripts/export_intent_lora.yaml

### model
model_name_or_path: Qwen/Qwen3-1.7B-Base

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.0

### dataset
dataset: day_trip_intent
dataset_dir: /Users/ayyaswamy/projects/routeiq/data
template: default
cutoff_len: 2048
max_samples: 100000

### output
output_dir: /Users/ayyaswamy/projects/routeiq/models/intent_adapter_v2
logging_steps: 5
save_steps: 100
overwrite_output_dir: true

### training
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 0
bf16: true
optim: adamw_torch
max_grad_norm: 1.0
report_to: none
