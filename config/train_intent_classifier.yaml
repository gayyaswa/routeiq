### model
model_name_or_path: Qwen/Qwen3-1.7B-Base

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.0

### dataset
dataset: day_trip_intent
dataset_dir: ./data
template: qwen3
cutoff_len: 256
max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 2

### output
output_dir: ./models/intent_adapter
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
# MPS backend: do not enable fp16 or bf16 — PyTorch MPS uses native precision
